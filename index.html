<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hub Discord</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 50px 20px;
    background: linear-gradient(135deg, #1a1040 0%, #0d1f3c 50%, #0a2a1a 100%);
  }

  h1 {
    text-align: center;
    font-size: 2em;
    font-weight: 500;
    color: #fff;
    margin-bottom: 2rem;
    letter-spacing: 0.3px;
  }

  .hub-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 16px;
    width: 100%;
    max-width: 900px;
  }

  .card {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 18px;
    padding: 1.5rem 1rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    position: relative;
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    transition: transform 0.35s cubic-bezier(.22,.9,.36,1), box-shadow 0.35s ease, background 0.35s ease;
    cursor: default;
    overflow: hidden;
  }

  .card:hover {
    transform: translateY(-8px) scale(1.02);
    background: rgba(255,255,255,0.14);
    box-shadow: 0 20px 50px rgba(0,0,0,0.45), 0 0 0 1px rgba(255,255,255,0.25);
  }

  .card.featured {
    grid-column: span 2;
    border-color: rgba(114,137,218,0.55);
    background: rgba(114,137,218,0.12);
  }

  .card.featured:hover {
    background: rgba(114,137,218,0.2);
    box-shadow: 0 20px 55px rgba(114,137,218,0.35), 0 0 0 1px rgba(114,137,218,0.5);
  }

  .shine {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 50%;
    border-radius: 18px 18px 60% 60% / 18px 18px 30px 30px;
    background: linear-gradient(to bottom, rgba(255,255,255,0.09), transparent);
    pointer-events: none;
  }

  .badge {
    position: absolute;
    top: 12px;
    right: 12px;
    background: rgba(114,137,218,0.35);
    border: 1px solid rgba(114,137,218,0.6);
    color: #c5cfff;
    font-size: 11px;
    font-weight: 500;
    padding: 3px 10px;
    border-radius: 20px;
    backdrop-filter: blur(6px);
  }

  .avatar {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    object-fit: cover;
    margin-bottom: 12px;
    border: 2px solid rgba(255,255,255,0.2);
    transition: transform 0.35s cubic-bezier(.22,.9,.36,1), border-color 0.35s;
  }

  .card:hover .avatar {
    transform: scale(1.08);
    border-color: rgba(255,255,255,0.45);
  }

  .server-name {
    font-size: 15px;
    font-weight: 600;
    color: #fff;
    margin-bottom: 5px;
  }

  .server-desc {
    font-size: 12.5px;
    color: rgba(255,255,255,0.58);
    margin-bottom: 16px;
    line-height: 1.5;
  }

  .join-btn {
    display: inline-block;
    background: rgba(114,137,218,0.3);
    border: 1px solid rgba(114,137,218,0.6);
    color: #c5cfff;
    padding: 9px 22px;
    border-radius: 10px;
    text-decoration: none;
    font-size: 13px;
    font-weight: 500;
    transition: background 0.25s, color 0.25s, border-color 0.25s;
    backdrop-filter: blur(4px);
  }

  .join-btn:hover {
    background: rgba(114,137,218,0.65);
    border-color: rgba(114,137,218,0.9);
    color: #fff;
  }

  @media (max-width: 520px) {
    .card.featured { grid-column: span 1; }
  }
</style>
</head>
<body>

<h1>Mon Hub Discord</h1>

<div class="hub-grid">

  <!-- SITE-28 (MIS EN AVANT) -->
  <div class="card featured">
    <div class="shine"></div>
    <div class="badge">⭐ Principal</div>
    <img src="https://i.postimg.cc/SR28q7SP/justice-interne-1-removebg-preview.png" class="avatar" alt="Site-28">
    <div class="server-name">Site-28 [RP / FR]</div>
    <div class="server-desc">Serveur SCP RP principal — immersion, événements, lore.</div>
    <a href="https://discord.gg/ypfCshQmS8" target="_blank" class="join-btn">Rejoindre</a>
  </div>

  <!-- WISK STUDIO -->
  <div class="card">
    <div class="shine"></div>
    <img src="https://i.postimg.cc/SsjY77MJ/Mon-Logo.png" class="avatar" alt="Wisk Studio">
    <div class="server-name">Wisk Studio</div>
    <div class="server-desc">Développement, créations et discussions.</div>
    <a href="https://discord.gg/Hx8WXjaNCj" target="_blank" class="join-btn">Rejoindre</a>
  </div>

  <!-- COMMISSIONS -->
  <div class="card">
    <div class="shine"></div>
    <img src="https://i.postimg.cc/63DgfKQP/Group-157.png" class="avatar" alt="Commissions">
    <div class="server-name">Mes Commissions</div>
    <div class="server-desc">Découvre toutes mes commissions disponibles.</div>
    <a href="https://discord.gg/hPv5ee6Paej" target="_blank" class="join-btn">Rejoindre</a>
  </div>

</div>

</body>
</html>
